set -g default-terminal "screen-256color"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5


bind -r m resize-pane -Z

set -g mouse on

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'

# Silence all of the bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Status bar configuration
set -g status-left-length 32
set -g status-right-length 150

set -g status-fg white
set -g status-bg "#1F1F28"

set -g status-left '#[fg=colour235,bg=white,bold] 📦 #S #[fg=white,bg=#1F1F28,nobold]'
set -g window-status-format "#[fg=white,bg=#1F1F28] #I #W "
set -g window-status-current-format "#[fg=#1F1F28,bg=blue,nobold]#[fg=#1F1F28,bg=blue] #[fg=black,bg=blue,noreverse,bold]#I  #W #[fg=blue,bg=#1F1F28,nobold]"
set -g status-right "#{user}@#H #[fg=blue,bg=#1F1F28]#[fg=#1F1F28,bg=blue] %H:%M "

# This needs to stay as the very last line of the config
run '~/.tmux/plugins/tpm/tpm'
