name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          ignore_paths: "tmux nvim"
